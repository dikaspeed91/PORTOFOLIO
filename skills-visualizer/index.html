<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">My Skills</h1>
        <div class="skills-grid">
            <div class="skill-item" data-skill="95" data-name="PHP">
                <img src="../images/PHP.png" alt="PHP" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">PHP</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
            <div class="skill-item" data-skill="90" data-name="HTML">
                <img src="../images/html.png" alt="HTML" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">HTML</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
            <div class="skill-item" data-skill="90" data-name="CSS">
                <img src="../images/CSS.png" alt="CSS" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">CSS</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
            <div class="skill-item" data-skill="85" data-name="JavaScript">
                <img src="../images/js.png" alt="JavaScript" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">JavaScript</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
            <div class="skill-item" data-skill="80" data-name="Python">
                <img src="../images/PHYTON.png" alt="Python" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">Python</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
            <div class="skill-item" data-skill="85" data-name="MySQL">
                <img src="../images/MySQL.png" alt="MySQL" loading="lazy">
                <div class="tooltip">
                    <span class="skill-name">MySQL</span>
                    <div class="skill-bar">
                        <div class="skill-progress"></div>
                    </div>
                    <span class="skill-percent">0%</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
